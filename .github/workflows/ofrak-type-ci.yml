name: OFRAK Type and IO CI

on:
  pull_request:
    paths:
      - 'ofrak_type/**'
      - 'ofrak_io/**'
      - '.github/workflows/ofrak-type-ci.yml'
  push:
    branches:
      - feature/windows_tests
    #      - master
#    paths:
#      - 'ofrak_type/**'
#      - 'ofrak_io/**'
#      - '.github/workflows/ofrak-type-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-ofrak-type-sdist:
    name: Build OFRAK Type source distribution
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install -r pip-requirements.txt
          pip install build

      - name: Build OFRAK Type source distribution
        run: |
          cd ofrak_type
          python -m build --sdist --outdir ../dist-type

      - name: List built packages
        run: |
          echo "Built OFRAK Type packages:"
          ls -la dist-type/

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: ofrak-type-sdist
          path: dist-type/
          retention-days: 30

  test-ofrak-type:
    name: Test OFRAK Type on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: build-ofrak-type-sdist
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: ofrak-type-sdist
          path: dist-type/

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Create virtual environment
        run: |
          python -m venv venv
        
      - name: Activate virtual environment (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          source venv/bin/activate
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          
      - name: Activate virtual environment (Windows)
        if: runner.os == 'Windows'
        run: |
          venv\Scripts\activate
          echo "VIRTUAL_ENV=$env:VIRTUAL_ENV" >> $env:GITHUB_ENV
          echo "$env:VIRTUAL_ENV\Scripts" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install pinned pip version
        run: |
          python -m pip install -r pip-requirements.txt

      - name: Install development requirements
        run: |
          pip install -r dev-requirements.txt

      - name: Install OFRAK Type from sdist
        run: |
          pip install dist-type/*.tar.gz

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd ofrak_type
          make test

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          cd ofrak_type
          make test PYTHON=python

  build-ofrak-io-sdist:
    name: Build OFRAK IO source distribution
    runs-on: ubuntu-latest
    needs: test-ofrak-type
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download ofrak_type source distribution
        uses: actions/download-artifact@v4
        with:
          name: ofrak-type-sdist
          path: dist-type/

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install -r pip-requirements.txt
          pip install build

      - name: Install ofrak_type from sdist
        run: |
          pip install dist-type/*.tar.gz

      - name: Build OFRAK IO source distribution
        run: |
          cd ofrak_io
          python -m build --sdist --outdir ../dist-io

      - name: List built packages
        run: |
          echo "Built OFRAK IO packages:"
          ls -la dist-io/

      - name: Upload OFRAK IO source distribution
        uses: actions/upload-artifact@v4
        with:
          name: ofrak-io-sdist
          path: dist-io/
          retention-days: 30

  test-ofrak-io:
    name: Test OFRAK IO on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: build-ofrak-io-sdist
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download ofrak_type source distribution
        uses: actions/download-artifact@v4
        with:
          name: ofrak-type-sdist
          path: dist-type/

      - name: Download ofrak_io source distribution
        uses: actions/download-artifact@v4
        with:
          name: ofrak-io-sdist
          path: dist-io/

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Create virtual environment
        run: |
          python -m venv venv
        
      - name: Activate virtual environment (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          source venv/bin/activate
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          
      - name: Activate virtual environment (Windows)
        if: runner.os == 'Windows'
        run: |
          venv\Scripts\activate
          echo "VIRTUAL_ENV=$env:VIRTUAL_ENV" >> $env:GITHUB_ENV
          echo "$env:VIRTUAL_ENV\Scripts" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install pinned pip version
        run: |
          python -m pip install -r pip-requirements.txt

      - name: Install development requirements
        run: |
          pip install -r dev-requirements.txt

      - name: Install ofrak_type from sdist
        run: |
          pip install dist-type/*.tar.gz

      - name: Install OFRAK IO from sdist
        run: |
          pip install dist-io/*.tar.gz

      - name: Run OFRAK IO tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd ofrak_io
          make test

      - name: Run OFRAK IO tests (Windows)
        if: runner.os == 'Windows'
        run: |
          cd ofrak_io
          make test PYTHON=python
